# =============================================================================
# Unified Country Deal Model (Workshop Decision — March 16, 2026)
# =============================================================================
# NO TIERS. One model for all countries.
# Andy Price (CFO): "I do not want to overthink different variants.
#   I want to get UAE model genericized first. Don't want three different things. I want one."
#
# Equity: 100/0 — Counterparty owns 100%, Alpha owns 0% (Marriott model)
# Andy: "For the version 1, it's equity is 100, 0"
# =============================================================================

unified_model:
  name: "Alpha Education Partnership"
  description: >
    Single universal deal model for all countries.
    Counterparty owns 100% of the local entity; Alpha operates as
    exclusive operator & licensor (0% equity). Dual-school structure:
    Flagship schools + National/Public schools.

  equity_structure:
    alpha_equity_pct: 0        # Alpha holds 0%
    counterparty_equity_pct: 100  # Counterparty owns 100%
    model: "Operator & Licensor (Marriott model)"
    description: >
      Alpha is the exclusive operator and IP licensor.
      The local entity (counterparty) owns 100% of equity.
      This follows the Ed71/Next71 UAE structure.

  # ---------------------------------------------------------------------------
  # Flagship: Halo Alpha Schools
  # ---------------------------------------------------------------------------
  prong_1_flagship:
    description: >
      Premium flagship schools in capital city + 1-2 largest cities.
      Tuition set using AGI of top 20% wealthiest families.
    tuition_min: 40000         # $40K minimum
    tuition_max: 100000        # $100K maximum
    tuition_optimization: "Optimize total revenue within $40K-$100K range"
    tuition_method: "AGI (adjusted gross income) of top 20% wealthiest families"
    location: "Capital city + 1-2 of the country's biggest cities"
    real_estate_sourced_by: "counterparty"
    capacity_backstop_pct: 0.50  # 50% backstop, same as UAE
    backstop_duration_years: 5

  # ---------------------------------------------------------------------------
  # National / Public Schools (Ed71 model)
  # ---------------------------------------------------------------------------
  prong_2_national:
    description: >
      National-scale public school transformation.
      Fixed per-student budget — does NOT vary by country GDP or PPP.
    per_student_budget: 25000   # $25K FIXED — Andy: "can't run one of these schools for less than 20 bucks"
    re_and_surplus_assumption: 5000  # $5K for real estate + operating surplus (asterisk note)
    min_student_year_commit: 100000  # 100K student-years minimum
    pricing_note: >
      Counterparty pays the difference between $25K and their current
      per-student government funding. Andy: "100,000 students, take
      the difference between 25K and their current funding"
    budget_is_fixed: true       # NOT variable by country PPP/GDP

  # ---------------------------------------------------------------------------
  # Fee Structure (non-negotiable)
  # ---------------------------------------------------------------------------
  fee_structure:
    management_fee_pct: 0.10    # 10% of per-student budget
    timeback_license_pct: 0.20  # 20% of per-student budget
    management_fee_floor_per_student: 2500  # $2,500 minimum
    timeback_fee_floor_per_student: 5000    # $5,000 minimum

  # ---------------------------------------------------------------------------
  # Upfront Fees — FIXED, not country-scaled
  # Neeraj: "I don't see how these things scale"
  # ---------------------------------------------------------------------------
  upfront_fees:
    alphacore_license: 250000000         # $250M — FIXED for all countries
    incept_edllm: 250000000              # $250M — Country/State specific Incept EdLLM
    edtech_app_content_rd: 250000000     # $250M — Country/State specific EdTech Apps
    lifeskills_rd: 250000000             # $250M — Country/State specific Programs and Life Skills
    total_fixed_development: 1000000000  # $1B total fixed costs (4 × $250M)
    note: >
      Four FIXED upfront development costs: AlphaCore License, Incept EdLLM,
      EdTech Apps, and Programs & Life Skills — $250M each, $1B total.
      These do NOT scale by country GDP, population, or any other metric.
      Prepaid fees (Timeback, Operating Fee) scale by student count.

  # Prepaid fees — these CAN scale (based on student commitment)
  prepaid_fees:
    management_fee_prepay_formula: "student_years × per_student_budget × 10%"
    timeback_fee_prepay_formula: "student_years × per_student_budget × 20%"
    management_fee_prepay_min_years: 2
    description: "Prepaid commitments scale with student count. Fixed fees do not."


