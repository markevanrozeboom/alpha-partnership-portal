# Universal Deal Structure Rules (SPECS.md Section 2C)
# These are NON-NEGOTIABLE. Every proposal must satisfy all rules.

universal_rules:
  ip_ownership:
    description: "Alpha ALWAYS retains IP ownership of Timeback, AlphaCore, Guide School, and Incept eduLLM. No exceptions."
    enforceable: true
    exceptions: none
    ip_assets:
      - "Timeback"
      - "AlphaCore"
      - "Guide School"
      - "Incept eduLLM"

  local_ip_layer:
    description: "A local IP layer (equivalent of AsasOne in UAE) is always created and 100% owned by the local entity. It covers national identity, cultural values, and mandatory local curriculum."
    enforceable: true

  local_partner_funds:
    description: "Local partners or government funds real estate, marketing, and enrollment infrastructure."
    enforceable: true
    funded_by_local:
      - "real estate"
      - "marketing"
      - "enrollment infrastructure"

  management_fee:
    floor_percent: 0.10  # 10% of per-student budget
    description: "Management fee floor: 10% of per-student budget. Non-negotiable."

  timeback_license_fee:
    floor_percent: 0.20  # 20% of per-student budget
    description: "Timeback license fee floor: 20% of per-student budget. Non-negotiable."

  upfront_ip_fee:
    minimum_usd: 25000000  # $25M
    description: "Minimum $25M upfront IP development fee for any country deal. Covers localization, eduLLM training, curriculum adaptation, and Guide School setup."

  management_fee_prepayment:
    minimum_years: 2
    description: "Minimum 2 years management fee prepaid before Alpha begins operations."

  school_types:
    minimum: 2
    description: "Every proposal offers at least two school types (e.g., Flagship + Virtual, STEM + Sports)."

  guide_school:
    timeline_months: 12
    description: "Guide School must be established locally within the first 12 months. Local educators are trained as Guides before student enrollment begins."

  three_commitments:
    - "Children will love school"
    - "Children will learn 2x faster"
    - "Children will develop life skills for the AI age"
