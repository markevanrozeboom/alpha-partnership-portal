# =============================================================================
# Financial Formulas (Workshop Decision — March 16, 2026)
# =============================================================================
# PPP scaling REMOVED. Tier-based cost scaling REMOVED.
# The model is FIXED. Research is for "color commentary" only.
# Andy: "the model's fixed... your job is to change the words to feel right for the country"
# =============================================================================

formulas:
  # ---------------------------------------------------------------------------
  # Upfront Ask — FIXED development costs + variable prepaid fees
  # ---------------------------------------------------------------------------
  upfront_ask:
    formula: "fixed_development_total + mgmt_fee_prepay + timeback_fee_prepay"
    description: >
      Fixed development costs ($750M) plus variable prepaid fees.
      Fixed costs do NOT scale by country. Prepaid fees scale by student commitment.
    components:
      # FIXED — same for every country (Neeraj: "I don't see how these things scale")
      alphacore_license: 250000000        # $250M — to Alpha Holdings
      edtech_app_content_rd: 250000000    # $250M — local expense
      lifeskills_rd: 250000000            # $250M — local expense
      fixed_development_total: 750000000  # $750M total
      # VARIABLE — scales with student commitment
      mgmt_fee_prepay: "min_student_years × per_student_budget × 0.10 × prepay_years"
      timeback_fee_prepay: "min_student_years × per_student_budget × 0.20 × prepay_years"
    minimum: 25000000  # $25M floor (kept from original rules)

  # ---------------------------------------------------------------------------
  # Student Target — 100K minimum for national schools
  # ---------------------------------------------------------------------------
  student_target:
    national_min_student_years: 100000   # Andy: "100,000 students"
    description: >
      Minimum 100K student-year commitment for national/public schools.
      Flagship schools are separate and additive.

  # ---------------------------------------------------------------------------
  # Per-Student Budget — FIXED at $25K for national schools
  # ---------------------------------------------------------------------------
  per_student_budget:
    national_schools: 25000  # FIXED — Andy: "can't run one of these schools for less than 20 bucks"
    re_and_surplus: 5000     # $5K assumption for RE + operating surplus (asterisk)
    is_fixed: true           # NOT variable by country
    description: >
      Per-student budget for national/public schools is FIXED at $25K.
      Does not vary by country GDP, PPP, or any other metric.
      The $5K RE + surplus is noted separately with an asterisk.

  # ---------------------------------------------------------------------------
  # Flagship Tuition — variable within $40K-$100K range
  # ---------------------------------------------------------------------------
  flagship_tuition:
    minimum: 40000    # $40K floor
    maximum: 100000   # $100K ceiling
    optimization: "Maximize total revenue within range"
    method: "Set using AGI of top 20% wealthiest families in target country"
    description: >
      Flagship school tuition is the ONE variable that depends on country data.
      Use adjusted gross income of top 20% families to set optimal tuition.

  # ---------------------------------------------------------------------------
  # Fee Revenue Calculations
  # ---------------------------------------------------------------------------
  management_fee_rev:
    formula: "total_students × per_student_budget × 0.10 × years"
    description: "Management fee: 10% of per-student budget, ongoing"
    fee_pct: 0.10

  timeback_license_rev:
    formula: "total_students × per_student_budget × 0.20 × years"
    description: "Timeback license fee: 20% of per-student budget, ongoing"
    fee_pct: 0.20


# =============================================================================
