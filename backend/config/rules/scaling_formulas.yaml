# Scaling Formulas (SPECS.md Section 2D)
# The system uses these formulas to calculate the headline numbers for any country.
# All are user-overridable at HITL decision gates.

formulas:
  ppp_factor:
    formula: "min(1.0, gdp_per_capita / 30000)"
    description: "Purchasing Power Parity factor, capped at 1.0"
    reference_gdp: 30000

  upfront_ask:
    formula: "alphacore_license + app_content_rd + lifeskills_rd + (student_target_5yr * per_student_budget * 0.10) + (student_target_5yr * per_student_budget * 0.20)"
    description: "Fixed development costs (AlphaCore License + App Content R&D + LifeSkills R&D) + variable fees (Management Fee 10% + Timeback 20% of students × budget)"
    components:
      alphacore_license:
        tier_1: 250000000
        tier_2: 150000000
        tier_3: 100000000
      app_content_rd:
        tier_1: 250000000
        tier_2: 150000000
        tier_3: 100000000
      lifeskills_rd:
        tier_1: 250000000
        tier_2: 150000000
        tier_3: 100000000
      management_fee_upfront: "student_target_5yr * per_student_budget * 0.10"
      timeback_upfront: "student_target_5yr * per_student_budget * 0.20"
    fixed_dev_costs:
      tier_1: 750000000  # $250M × 3
      tier_2: 450000000  # $150M × 3
      tier_3: 300000000  # $100M × 3
    minimum: 25000000  # $25M floor

  student_target_5yr:
    formula: "max(5000, school_age_pop * 0.10)"
    description: "Target student count at Year 5 — must be no less than 10% of market size (school-age population)"
    minimum: 5000
    penetration_rate: 0.10  # 10% of school-age population (market size floor)

  per_student_budget:
    formula: "max(5000, min(30000, private_school_avg_tuition * 0.8))"
    description: "Per-student budget, bounded between $5K and $30K"
    minimum: 5000
    maximum: 30000
    tuition_multiplier: 0.8  # 80% of average private school tuition

  management_fee_rev:
    formula: "students * per_student_budget * 0.10 * 5"
    description: "Management fee revenue over 5 years"
    fee_pct: 0.10
    years: 5

  timeback_license_rev:
    formula: "students * per_student_budget * 0.20 * 5"
    description: "Timeback license fee revenue over 5 years"
    fee_pct: 0.20
    years: 5

demand_factor_defaults:
  tier_1: 1.0
  tier_2: 0.5
  tier_3: 0.2
  description: "Derived from private school enrollment rate, government reform appetite, and competitive density."
