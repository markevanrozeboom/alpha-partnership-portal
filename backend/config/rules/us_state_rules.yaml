# US State Rules (SPECS.md Section 2B)
# US states follow a fundamentally different model from countries.
# No upfront government payment, no JV, no billion-dollar asks.
# Revenue comes from per-student tuition (private pay), ESA/voucher capture,
# and potential state contracts.

revenue_model:
  description: "Revenue from in-person schools, virtual product, and ESA/voucher capture"
  streams:
    - type: "in_person_schools"
      description: "Micro schools (12-25 students) and 250-student campuses. Tuition priced at or near ESA amount where available ($7K-$10K in AZ/FL/TX), with premium tiers at $15K-$25K."
    - type: "virtual_product"
      description: "GT School model: $3K-$5K per student. High margin, scales fast, aligns with homeschool/ESA use cases."
    - type: "esa_voucher_capture"
      description: "In top 5 priority states, ESA covers 55-82% of average private school tuition. Systems priced at ESA floor maximize addressable market."

school_types:
  - name: "Micro School"
    size_range: [12, 25]
    tuition_range: [7000, 10000]
    target_family: "ESA families, first-time school choice"
    tuition_note: "Priced at ESA level"
  - name: "Flagship Campus"
    size_range: [250, 250]
    tuition_range: [15000, 25000]
    target_family: "Upper-middle income, supplementing ESA"
  - name: "Virtual (GT School)"
    size_range: null  # Unlimited
    tuition_range: [3000, 5000]
    target_family: "Homeschool, rural, ESA-funded"
  - name: "STEM / Sports Academy"
    size_range: [100, 250]
    tuition_range: [12000, 20000]
    target_family: "Specialty demand"

key_metrics:
  cac_target_max: 500  # Customer Acquisition Cost < $500
  ltv_calculation: "ESA-level tuition over 5-year retention = $35K-$50K"
  ltv_range: [35000, 50000]

priority_states:
  - rank: 1
    state: "Florida"
    description: "Largest school choice market. 500K+ on vouchers. $3.9B annual spend. Universal eligibility. Light-touch regulation."
  - rank: 2
    state: "Texas"
    description: "Most powerful emerging market. 5.5M public school students. ESA launches 2026-27 with ~$10K/student. First-mover advantage."
  - rank: 3
    state: "Arizona"
    description: "Pioneer ESA state. 83,819 participants. Highest charter penetration outside DC at 20.5%. Strong micro-school culture."
  - rank: 4
    state: "Indiana"
    description: "Number 1 ranked charter law. 79,448 voucher users. Fully universal July 2026. Affordable market."
  - rank: 5
    state: "North Carolina"
    description: "Fastest growing ESA participation. 103,400 students (nearly 3x growth). 77% of charter schools have waitlists."

esa_data:
  Florida:
    esa_amount: "$9,500-$10,700"
    students_on_vouchers: 500000
    avg_private_tuition: 13859
    esa_coverage_pct: 0.72  # ~72%
  Texas:
    esa_amount: "$10,000-$10,200"
    students_on_vouchers: 95000  # Y1 est.
    avg_private_tuition: 13995
    esa_coverage_pct: 0.73  # ~73%
    launch_year: "2026-27"
  Arizona:
    esa_amount: "$7,000-$8,000"
    students_on_vouchers: 83819
    avg_private_tuition: 12314
    esa_coverage_pct: 0.61  # ~57-65%, midpoint
  Indiana:
    esa_amount: "$6,100-$7,400"
    students_on_vouchers: 79448
    avg_private_tuition: 10330
    esa_coverage_pct: 0.63  # ~63%
  North_Carolina:
    esa_amount: "$3,000-$7,000"
    students_on_vouchers: 103400
    avg_private_tuition: 11105
    esa_coverage_pct: 0.44  # ~25-63%, midpoint
