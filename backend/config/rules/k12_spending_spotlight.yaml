# ---------------------------------------------------------------------------
# Key Insights for Alpha's US State Strategy
# ---------------------------------------------------------------------------

alpha_insights:
  spending_vs_outcomes_disconnect:
    summary: >
      The core Spending Spotlight finding — per-pupil spending rose 35.8% while
      outcomes stagnated or declined — is Alpha's strongest argument:
      "This isn't a funding problem, it's a model problem."
    top_spender_example: "New York spends $36,976/student yet 68% of 4th graders aren't proficient in reading"
    lowest_spender_example: "Utah spends $9,966/student yet outperforms many higher-spending states on NAEP"

  benefit_spending_crisis:
    summary: >
      81.1% increase in benefit spending (mostly pension debt) means less money
      reaches classrooms. Alpha's model (AI + guides) sidesteps the pension burden
      entirely.
    nj_example: "New Jersey spends $8,333/student on benefits alone — nearly as much as some states' total per-pupil spend"

  staffing_bloat:
    summary: >
      Non-teaching staff grew 22.8% while enrollment grew 4.1%. Alpha's lean
      guide model (5 guides per campus) vs traditional school staffing
      (30+ staff per campus) represents a fundamentally different cost structure.

  enrollment_decline_opportunity:
    summary: >
      39 states saw enrollment decline 2020-2023. Families are voting with their feet.
      This creates demand for alternatives like Alpha's micro-schools and virtual programs.
    growth_states: ["Texas", "Utah", "Idaho", "Nebraska", "South Dakota", "Montana", "North Dakota", "Florida"]

  teacher_salary_paradox:
    summary: >
      Despite 35.8% more spending per student, teacher salaries fell 6.1%.
      Money is being absorbed by administration, benefits, and non-instructional costs.
      Alpha's model pays guides competitively while eliminating administrative bloat.

