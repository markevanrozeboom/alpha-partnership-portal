# =============================================================================
# K-12 Spending Spotlight 2025 — Reason Foundation
# Source: https://spending-spotlight.reason.org
# Data period: 2002–2023 (NCES Annual Survey of School System Finances / F-33)
# All dollar figures are inflation-adjusted to 2023 dollars unless noted.
# =============================================================================

source:
  name: "Reason Foundation K-12 Spending Spotlight 2025"
  url: "https://spending-spotlight.reason.org"
  data_period: "2002-2023"
  methodology_url: "https://spendingspotlight.org/methodology/"
  primary_data_source: "NCES Annual Survey of School System Finances (F-33)"
  last_updated: "2025"

# ---------------------------------------------------------------------------
# National Trends (2002 → 2023, inflation-adjusted to 2023 dollars)
# ---------------------------------------------------------------------------

national_trends:
  total_k12_spending:
    amount_2023: "~$1 trillion"
    description: "Annual public school spending approaches $1 trillion nationally"

  per_pupil_spending:
    year_2002: 14969
    year_2023: 20322
    change_pct: 35.8
    national_average_2023: 20322
    description: "Per-student spending rose 35.8% from $14,969 (2002) to $20,322 (2023)"

  enrollment:
    change_2002_2023_pct: 4.1
    states_with_decline_2020_2023: 39
    description: "Public school enrollment rose only 4.1% from 2002-2023; 39 states saw declines from 2020-2023"

  teacher_salary:
    avg_2002: 75152
    avg_2022: 70548
    change_pct: -6.1
    description: "Inflation-adjusted average teacher salary fell 6.1% from $75,152 to $70,548"

  staffing:
    non_teaching_staff_growth_pct: 22.8
    enrollment_growth_pct: 4.1
    teachers_as_share_of_staff_trend: "declining"
    description: "Non-teaching staff grew 22.8% vs 4.1% enrollment growth"

  employee_benefits:
    per_student_2002: 2221
    per_student_2023: 4022
    change_pct: 81.1
    primary_driver: "teacher pension debt"
    description: "Benefit spending surged 81.1% per student, driven by pension obligations"

  student_outcomes:
    naep_4th_grade_reading_below_basic_pct: 40
    description: "Nearly 40% of 4th graders aren't reading at basic proficiency levels (NAEP)"

  revenue_sources:
    federal_pct: ~8
    state_pct: ~45
    local_pct: ~47
    description: "K-12 revenue split roughly 8% federal, 45% state, 47% local"

  states_above_25k:
    - "New York"
    - "New Jersey"
    - "Vermont"
    - "Connecticut"
    - "Pennsylvania"
    - "California"
    - "Rhode Island"
    - "Hawaii"

