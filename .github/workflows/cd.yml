name: CD – Deploy

on:
  push:
    branches: ["main"]

jobs:
  # ─── Deploy backend to Render ─────────────────────────────────────────────────
  deploy-backend:
    name: Deploy backend → Render
    runs-on: ubuntu-latest
    environment: production
    permissions: {}

    steps:
      - name: Trigger Render deploy hook
        # Set RENDER_DEPLOY_HOOK_BACKEND in repository → Settings → Secrets
        run: |
          curl -s --fail-with-body -X POST "${{ secrets.RENDER_DEPLOY_HOOK_BACKEND }}"

  # ─── Deploy frontend to Vercel ────────────────────────────────────────────────
  deploy-frontend:
    name: Deploy frontend → Vercel
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: frontend

      - name: Build project artifacts
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: frontend
        env:
          NEXT_TELEMETRY_DISABLED: "1"

      - name: Deploy to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: frontend

  # ─── Deploy portal to Render ──────────────────────────────────────────────────
  deploy-portal:
    name: Deploy portal → Render
    runs-on: ubuntu-latest
    environment: production
    permissions: {}

    steps:
      - name: Trigger Render deploy hook
        # Set RENDER_DEPLOY_HOOK_PORTAL in repository → Settings → Secrets
        run: |
          curl -s --fail-with-body -X POST "${{ secrets.RENDER_DEPLOY_HOOK_PORTAL }}"
