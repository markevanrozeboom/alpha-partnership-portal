name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  # ─── Backend (Python / FastAPI) ──────────────────────────────────────────────
  lint-backend:
    name: Backend – lint & type-check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt flake8 mypy

      - name: Lint (flake8)
        run: |
          flake8 . \
            --max-line-length=150 \
            --exclude=__pycache__,.venv

      - name: Type-check (mypy)
        run: |
          mypy . \
            --ignore-missing-imports \
            --exclude "(__pycache__|\.venv)" \
            --no-error-summary
        continue-on-error: true   # treat as advisory until stubs are complete

  # ─── Frontend (Next.js) ──────────────────────────────────────────────────────
  build-frontend:
    name: Frontend – type-check, lint & build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type-check
        run: npx tsc --noEmit

      - name: Lint (ESLint)
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          # Silence Next.js telemetry in CI
          NEXT_TELEMETRY_DISABLED: "1"

  # ─── Portal (Express + React / Vite) ─────────────────────────────────────────
  build-portal:
    name: Portal – type-check & build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: portal

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: portal/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type-check
        run: npm run check

      - name: Build
        run: npm run build
