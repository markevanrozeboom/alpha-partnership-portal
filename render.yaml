services:
  # ── FastAPI backend ──────────────────────────────────────────────────────────
  - type: web
    name: alpha-pipeline-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: PERPLEXITY_API_KEY
        sync: false
      - key: GAMMA_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: 3.12.3

  # ── Customer portal (Express + Vite SPA) ─────────────────────────────────────
  - type: web
    name: alpha-portal
    runtime: node
    rootDir: portal
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
