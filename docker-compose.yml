services:
  # ── FastAPI backend ─────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - PYTHON_VERSION=3.12.3
    volumes:
      # Mount source for hot-reload in development (override start command below)
      - ./backend:/app
    restart: unless-stopped

  # ── Next.js frontend ────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped

  # ── Customer portal (Express + Vite SPA) ────────────────────────────────────
  portal:
    build:
      context: ./portal
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    env_file:
      - ./portal/.env
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/portal
    depends_on:
      - backend
      - db
    restart: unless-stopped

  # ── PostgreSQL database (portal only) ────────────────────────────────────────
  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: portal
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
